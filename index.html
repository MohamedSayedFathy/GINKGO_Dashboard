<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>GINKGO Dashboard</title>
  <style>
    html, body {
      margin: 0;
      padding: 0;
      height: 100%;
      width: 100%;
      overflow: hidden;
      background: #111;
    }
    canvas {
      display: block;
      width: 100%;
      height: 100%;
      outline: none;
    }
  </style>
  <!--
    `data-trunk rel="rust"` asks trunk to build the default cargo target. With
    `crate-type = ["cdylib", "rlib"]` on the library, trunk picks the cdylib
    (which is what we want: the wasm entry is `#[wasm_bindgen(start)]` in
    `src/wasm.rs`, reachable only through the library). `data-wasm-opt="z"`
    runs wasm-opt in size mode for release builds; it's a no-op in debug.
  -->
  <link data-trunk rel="rust" data-wasm-opt="z" />
</head>
<body>
  <canvas id="the_canvas_id"></canvas>
</body>
</html>
